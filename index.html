<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Afua ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.2rem;
      line-height: 1.6;
    }
    .heart {
      font-size: 2rem;
      animation: beat 1s infinite;
    }
    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #fff;
      color: #ff6f91;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Happy Birthday, Afua ❤️</h1>
    <p>
      To my dearest Afia,<br><br>
      Life has changed so much since you came into my life.
      Thank you for being my happiness, my peace, and my everything.
      <br><br>
      I love you more than words can express 💫
    </p>
    <div class="heart">❤️</div>
    <button onclick="showMessage()">Click Me 💌</button>
    <p id="hiddenMessage" style="display:none; margin-top:15px;">
      You are the best thing that ever happened to me. Forever yours 💖
    </p>
  </div>

  <script>
    function showMessage() {
      document.getElementById('hiddenMessage').style.display = 'block';
    }
  </script>
</body>
</html>
